name = "data-carsads"
main = "../../../platform/packages/data-worker/src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

[[routes]]
pattern = "data-carsads.proappstore.online"
zone_name = "proappstore.online"
custom_domain = true

[vars]
APP_ID = "carsads"
FAS_API_BASE = "https://api.freeappstore.online"

[[d1_databases]]
binding = "DB"
database_name = "carsads"
# Provisioned via `pas create` or POST https://api.proappstore.online/v1/provision.
# Fill in the database_id returned by provisioning before deploying the data worker.
database_id = "PROVISION_ME"
